[core]
shell=kiosk
idle-time=0
xwayland=true
backend=drm,rdp

[shell]
panel-position=top

[rdp]
tls-key=/home/kiosk/.config/rdp/rdp.key
tls-cert=/home/kiosk/.config/rdp/rdp.crt

[output]
name=eDP-1
mode=1024x768

[output]
name=Virtual-1
mode=1024x768

[output]
name=rdp-0
mirror-of=eDP-1

[autolaunch]
#path=/data/opt/Monarch/launcher.sh
path=/usr/bin/weston-terminal
watch=false
